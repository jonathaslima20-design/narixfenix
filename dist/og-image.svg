<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.018"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="brain-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="brain-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="logo-glow" x="-15%" y="-80%" width="130%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1200" height="630" fill="#060809"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.018" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="280" rx="480" ry="360" fill="url(#bg-glow)"/>

  <!-- Brain halo -->
  <ellipse cx="600" cy="268" rx="280" ry="240" fill="url(#brain-halo)"/>

  <!--
    Brain icon: Lucide Brain 24x24 viewbox
    Scaled to ~480px wide (factor 20), centered at (600, 268)
    translate so that 12×20=240 lands at 600 → x offset = 600-240 = 360
    and 11×20=220 lands at 268 → y offset = 268-220 = 48
  -->
  <g transform="translate(360, 48) scale(20)"
     filter="url(#brain-glow)"
     fill="none"
     stroke="rgba(255,255,255,0.80)"
     stroke-width="0.9"
     stroke-linecap="round"
     stroke-linejoin="round">
    <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/>
    <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/>
    <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/>
    <path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/>
    <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/>
    <path d="M3.477 10.896a4 4 0 0 1 .585-.396"/>
    <path d="M19.938 10.5a4 4 0 0 1 .585.396"/>
    <path d="M6 18a4 4 0 0 1-1.967-.516"/>
    <path d="M19.967 17.484A4 4 0 0 1 18 18"/>
  </g>

  <!-- WORDMARK -->
  <text
    x="600" y="566"
    font-family="'Geist Mono', 'Courier New', ui-monospace, monospace"
    font-size="48"
    font-weight="400"
    fill="rgba(255,255,255,0.88)"
    text-anchor="middle"
    letter-spacing="-1"
    filter="url(#logo-glow)"
  >brainlead</text>

  <!-- TAGLINE -->
  <text
    x="600" y="602"
    font-family="'Geist Mono', 'Courier New', ui-monospace, monospace"
    font-size="13"
    font-weight="300"
    fill="rgba(255,255,255,0.32)"
    text-anchor="middle"
    letter-spacing="4"
  >TRANSFORME LEADS EM VENDAS</text>

  <!-- Bottom edge -->
  <rect x="0" y="628" width="1200" height="2" fill="rgba(255,255,255,0.05)"/>
</svg>
